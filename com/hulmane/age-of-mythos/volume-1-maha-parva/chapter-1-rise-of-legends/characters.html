<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heroes &mdash; Hulmane-The-Saga</title>
  <link rel="stylesheet" href="css/style.css">
  <style>

    /* ── Page header ── */
    .ch-header { text-align:center; padding:90px 20px 28px; }
    .ch-header h1 { font-size:2rem; margin-bottom:8px; font-family:Georgia,serif; }
    .ch-header p  { color:var(--text-dim); max-width:600px; margin:0 auto; line-height:1.7; font-size:.9em; }

    /* ── Level 1: Region filter ── */
    .ch-region-bar {
      display:flex; flex-wrap:wrap; justify-content:center; gap:8px;
      padding:10px 20px; position:sticky; top:64px; z-index:20;
      background:var(--bg); border-bottom:1px solid var(--border-dim);
    }
    .ch-region-btn {
      padding:7px 18px; border-radius:24px;
      border:1px solid var(--border-dim); background:none;
      color:var(--text-dim); font-size:.8em; cursor:pointer;
      transition:all .18s; white-space:nowrap; display:flex; align-items:center; gap:5px;
    }
    .ch-region-btn:hover { color:var(--text); }
    .ch-region-btn.active { color:#000 !important; font-weight:bold; border-color:transparent; }

    /* ── Level 2: State filter ── */
    .ch-state-bar {
      display:flex; flex-wrap:wrap; justify-content:center; align-items:center; gap:6px;
      padding:8px 20px; min-height:44px;
      background:rgba(0,0,0,.22); border-bottom:1px solid var(--border-dim);
    }
    .ch-state-btn {
      padding:4px 13px; border-radius:18px;
      border:1px solid var(--border-dim); background:none;
      color:var(--text-dim); font-size:.74em; cursor:pointer; transition:all .15s;
    }
    .ch-state-btn:hover  { color:var(--text); border-color:currentColor; }
    .ch-state-btn.active { border-color:var(--rc,var(--gold)); color:var(--rc,var(--gold)); background:rgba(255,255,255,.04); font-weight:bold; }
    .ch-state-hint { color:var(--text-dim); font-size:.75em; opacity:.45; }

    /* ── Results count ── */
    .ch-count { text-align:center; padding:10px 20px 0; font-size:.72em; color:var(--text-dim); opacity:.55; }

    /* ── Card grid ── */
    .ch-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(295px, 1fr));
      gap:20px; padding:18px 24px 60px;
    }

    /* ── Kingdom story card ── */
    .ch-card {
      background:rgba(0,0,0,.36); border:1px solid var(--border-dim);
      border-radius:14px; overflow:hidden;
      display:flex; flex-direction:column;
      transition:border-color .2s, transform .18s, box-shadow .2s;
    }
    .ch-card:hover {
      border-color:var(--rc,var(--gold));
      transform:translateY(-3px);
      box-shadow:0 8px 28px rgba(0,0,0,.45);
    }
    .ch-card-stripe { height:3px; opacity:.65; }

    /* Kingdom header */
    .ch-kingdom-head { padding:12px 15px 10px; border-bottom:1px solid rgba(255,255,255,.05); }
    .ch-badge-row    { display:flex; align-items:center; gap:6px; margin-bottom:6px; flex-wrap:wrap; }
    .ch-region-badge {
      font-size:.54em; text-transform:uppercase; letter-spacing:1.5px;
      padding:2px 8px; border-radius:12px; border:1px solid currentColor;
    }
    .ch-state-badge { font-size:.62em; color:var(--text-dim); }
    .ch-kingdom-name { font-family:Georgia,serif; font-size:.92em; line-height:1.25; margin:0 0 4px; }
    .ch-motto { font-size:.66em; color:var(--text-dim); font-style:italic; opacity:.7; line-height:1.4; margin:0; }

    /* Portrait strip */
    .ch-portraits {
      display:grid; grid-template-columns:1fr 30px 1fr;
      align-items:stretch; border-bottom:1px solid rgba(255,255,255,.05);
    }
    .ch-portrait-cell { display:flex; flex-direction:column; overflow:hidden; }

    /* Real image */
    .ch-portrait-img {
      width:100%; aspect-ratio:3/4; object-fit:cover; object-position:top center;
      display:block;
    }

    /* SVG placeholder */
    .ch-portrait-svg {
      width:100%; aspect-ratio:3/4;
      position:relative; overflow:hidden;
    }
    .ch-portrait-svg svg { position:absolute; inset:0; width:100%; height:100%; }

    /* Portrait label */
    .ch-portrait-label  { padding:7px 10px 9px; background:rgba(0,0,0,.28); flex:1; }
    .ch-portrait-role   { font-size:.52em; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:2px; }
    .ch-portrait-name   { font-size:.78em; font-family:Georgia,serif; line-height:1.2; font-weight:bold; }
    .ch-portrait-title  { font-size:.62em; color:var(--text-dim); opacity:.75; line-height:1.3; margin-top:1px; }

    /* VS divider */
    .ch-vs {
      display:flex; align-items:center; justify-content:center;
      background:rgba(0,0,0,.45);
      font-size:.56em; font-family:Georgia,serif; font-weight:bold;
      color:rgba(255,255,255,.18); letter-spacing:3px;
      writing-mode:vertical-lr;
    }

    /* Info row */
    .ch-info-row { display:flex; flex-direction:column; gap:4px; padding:9px 14px; border-bottom:1px solid rgba(255,255,255,.05); }
    .ch-info-item { display:flex; align-items:flex-start; gap:7px; font-size:.73em; color:var(--text); opacity:.82; line-height:1.4; }
    .ch-info-icon { flex-shrink:0; width:16px; text-align:center; opacity:.65; }

    /* Footer */
    .ch-card-footer { padding:9px 13px; margin-top:auto; display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; }
    .ch-tattoo-mini { display:flex; gap:3px; align-items:center; }
    .ch-tattoo-mini img { width:26px; height:auto; border-radius:3px; border:1px solid rgba(255,255,255,.1); opacity:.8; }
    .ch-story-link {
      display:inline-flex; align-items:center; gap:5px; padding:5px 12px; border-radius:16px;
      border:1px solid; text-decoration:none; font-size:.71em; transition:background .15s; white-space:nowrap; flex-shrink:0;
    }
    .ch-story-link:hover { background:rgba(255,255,255,.06); }

    /* Empty */
    .ch-empty { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--text-dim); opacity:.45; }

    @media (max-width:600px) {
      .ch-grid { grid-template-columns:1fr; padding:12px; }
    }
  </style>
</head>
<body>

    
  <nav class="maha-nav">
    <a href="../../../../../index.html" class="nav-logo">Age of Mythos</a>
    <div class="nav-links">
      <a href="index.html">Volume I</a>
      <a href="kingdoms.html">Kingdoms</a>
      <a href="identity.html">Identities</a>
      <a href="characters.html" class="active">Heroes</a>
      <a href="systems.html">Systems</a>
      <a href="council.html">Council</a>
      <a href="bharatavarsha/global-map.html">Map</a>
    </div>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('nav-open')">&#9776;</button>
  </nav>

  <div class="ch-header">
    <h1>Heroes of the 30 Kingdoms</h1>
    <p>Every kingdom has a hero and a villain &mdash; mirrors of the same sacred beast.<br>
       Filter by region, then by state. Each tile is one kingdom story.</p>
  </div>

  <!-- Level 1: Region -->
  <div class="ch-region-bar" id="regionBar"></div>

  <!-- Level 2: State -->
  <div class="ch-state-bar" id="stateBar">
    <span class="ch-state-hint">Select a region above to filter by state</span>
  </div>

  <div class="ch-count" id="chCount"></div>
  <div class="ch-grid"  id="chGrid"></div>

  <script src="js/state-stories-data.js"></script>
  <script src="js/kingdom-identity-data.js"></script>
  <script>
  (function () {
    'use strict';

    /* ── Region meta ──────────────────────────────────────────────── */
    var REGIONS = [
      { id:'all',       label:'All Regions',       color:'#ffd700' },
      { id:'south',     label:'South',             color:'#44ff88', sub:'Dakshinapatha' },
      { id:'west',      label:'West',              color:'#ff8c00', sub:'Paschimapatha' },
      { id:'east',      label:'East',              color:'#44aaff', sub:'Purvapatha' },
      { id:'north',     label:'North',             color:'#7b9eff', sub:'Uttarapatha' },
      { id:'northeast', label:'Northeast',         color:'#aa66ff', sub:'Pragjyotisha' },
      { id:'central',   label:'Central',           color:'#ffaa00', sub:'Madhyadesa' }
    ];

    function regionColor(r) {
      var m = { south:'#44ff88', west:'#ff8c00', east:'#44aaff', north:'#7b9eff', northeast:'#aa66ff', central:'#ffaa00' };
      return m[r] || '#ffd700';
    }

    /* ── Shared slug function ──────────────────────────────────────── */
    function kingdomSlug(name) {
      return name.split('—')[0].trim().toLowerCase()
        .replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
    }

    var _ki = (typeof KINGDOM_IDENTITY !== 'undefined' ? KINGDOM_IDENTITY : (window.KINGDOM_IDENTITY || []));

    /* ── Portrait map — auto-built from new kingdom media folders ───── */
    var PORTRAIT_MAP = {};
    _ki.forEach(function (k) {
      var slug = kingdomSlug(k.kingdomName);
      var base = 'bharatavarsha/regions/' + k.region + '/' + slug + '/media/portraits/';
      PORTRAIT_MAP[k.id] = {
        hero:    base + k.id + '-hero-portrait.png',
        villain: base + k.id + '-villain-portrait.png'
      };
    });

    /* ── Tattoo base paths — new naming: {id}-tattoo-stage-{n}-{label}.png */
    var TATTOO_BASE = {};
    var TATTOO_LABELS = { 1:'footprint', 2:'leg', 3:'half-body', 4:'full-body' };
    _ki.forEach(function (k) {
      var slug = kingdomSlug(k.kingdomName);
      TATTOO_BASE[k.id] = 'bharatavarsha/regions/' + k.region + '/' + slug +
                          '/media/tattoo/' + k.id + '-tattoo-stage-';
    });

    /* ── Story URLs — auto-built pointing to new story.html ─────────── */
    var STORY_URLS = {};
    _ki.forEach(function (k) {
      var slug = kingdomSlug(k.kingdomName);
      STORY_URLS[k.id] = 'bharatavarsha/regions/' + k.region + '/' + slug + '/story.html';
    });

    /* keep alias for old tattooPath references */
    var TATTOO_PATHS = {};

    /* ── Build CHAPTERS ─────────────────────────────────────────────── */
    var CHAPTERS = [];

    var _sk = (typeof STATE_KINGDOMS !== 'undefined' ? STATE_KINGDOMS : (window.STATE_KINGDOMS || []));
    if (_sk.length) {
      _sk.forEach(function (k) {
        CHAPTERS.push({
          stateId:     k.stateId,
          stateName:   k.stateName,
          region:      k.region,
          kingdomName: k.kingdomName,
          motto:       k.motto || '',
          hero: {
            name:   k.hero   ? k.hero.name   : '—',
            title:  k.hero   ? k.hero.title  : '',
            weapon: k.hero   ? k.hero.weapon : ''
          },
          villain: {
            name:  k.villain ? k.villain.name  : '—',
            title: k.villain ? k.villain.title : ''
          },
          animal:     k.animal ? k.animal.name : '',
          bird:       k.bird   ? k.bird.name   : '',
          heroImg:    (PORTRAIT_MAP[k.stateId] && PORTRAIT_MAP[k.stateId].hero)    || null,
          villainImg: (PORTRAIT_MAP[k.stateId] && PORTRAIT_MAP[k.stateId].villain) || null,
          storyUrl:   STORY_URLS[k.stateId] || null,
          tattooBase: TATTOO_BASE[k.stateId] || null
        });
      });
    }

    /* Extra: Karnataka — Buried Temple */
    CHAPTERS.push({
      stateId:'karnataka', stateName:'Karnataka', region:'south',
      kingdomName:'The Buried Temple of the Western Ghats',
      motto:'What is buried does not sleep — it waits',
      hero:    { name:'Vikramaditya', title:'The Hoysala Guardian', weapon:'Hoysalastra broadsword' },
      villain: { name:'Seekers of the Void', title:'The Treasure Hunters' },
      animal:'Indian Elephant', bird:'Indian Roller',
      heroImg:'bharatavarsha/regions/south/vijayanagara-reborn/media/story/hero-vikramaditya-portrait.png',
      villainImg:null,
      storyUrl:'bharatavarsha/regions/south/vijayanagara-reborn/stories/buried-temple.html',
      tattooBase: TATTOO_BASE['karnataka'] || null
    });

    /* Extra: Assam — Rhino Knight */
    CHAPTERS.push({
      stateId:'assam', stateName:'Assam', region:'northeast',
      kingdomName:'The Rhino Knight of Kaziranga',
      motto:'The last horn in India will not fall on my watch',
      hero:    { name:'Kamalavarna', title:'The Lotus Shield', weapon:'Ganda-Kavach shield and rhino-horn spear' },
      villain: { name:'The Syndicate', title:'The Poacher Army' },
      animal:'Indian One-horned Rhinoceros', bird:'Greater Adjutant Stork',
      heroImg:'bharatavarsha/regions/northeast/ganda-kshetra/media/portraits/assam-hero-portrait.png',
      villainImg:null,
      storyUrl:'bharatavarsha/regions/northeast/ganda-kshetra/stories/rhino-knight.html',
      tattooBase: TATTOO_BASE['assam'] || null
    });

    /* ── Portrait HTML ────────────────────────────────────────────── */
    function portraitHtml(name, imgSrc, isHero, rc) {
      var accent = isHero ? rc : '#ff6666';
      var bg     = isHero
        ? 'linear-gradient(160deg,' + rc + '28 0%,' + rc + '08 55%,rgba(0,0,0,.8) 100%)'
        : 'linear-gradient(160deg,#ff444420 0%,#aa000010 55%,rgba(0,0,0,.8) 100%)';
      var letter = name && name !== '—' ? name.charAt(0) : '?';

      if (imgSrc) {
        return (
          '<img class="ch-portrait-img" src="' + imgSrc + '" alt="' + name + '"' +
          ' onerror="this.style.display=\'none\';this.nextSibling.style.display=\'block\'">' +
          '<div class="ch-portrait-svg" style="display:none;background:' + bg + ';">' + svgArt(letter, accent) + '</div>'
        );
      }
      return '<div class="ch-portrait-svg" style="background:' + bg + ';">' + svgArt(letter, accent) + '</div>';
    }

    function svgArt(letter, color) {
      return (
        '<svg viewBox="0 0 100 133" xmlns="http://www.w3.org/2000/svg">' +
          '<circle cx="50" cy="52" r="38" fill="' + color + '0e" stroke="' + color + '28" stroke-width="1.5"/>' +
          '<circle cx="50" cy="52" r="24" fill="' + color + '15" stroke="' + color + '44" stroke-width="1"/>' +
          '<text x="50" y="60" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="' + color + '" opacity=".85">' + letter + '</text>' +
          '<line x1="18" y1="95" x2="82" y2="95" stroke="' + color + '1a" stroke-width="1"/>' +
          '<circle cx="30" cy="108" r="2.5" fill="' + color + '25"/>' +
          '<circle cx="50" cy="113" r="3.5" fill="' + color + '35"/>' +
          '<circle cx="70" cy="108" r="2.5" fill="' + color + '25"/>' +
        '</svg>'
      );
    }

    /* ── Build one card ───────────────────────────────────────────── */
    function buildCard(ch) {
      var rc = regionColor(ch.region);
      var rMeta = REGIONS.find(function (r) { return r.id === ch.region; }) || {};

      var heroPortrait    = portraitHtml(ch.hero.name,    ch.heroImg,    true,  rc);
      var villainPortrait = portraitHtml(ch.villain.name, ch.villainImg, false, rc);

      /* Tattoo mini row */
      var tattoos = '';
      var _tbase = ch.tattooBase || ch.tattooPath || null;
      if (_tbase) {
        var _tlabels = {1:'footprint', 2:'leg', 3:'half-body', 4:'full-body'};
        tattoos = '<div class="ch-tattoo-mini">';
        for (var i = 1; i <= 4; i++) {
          tattoos += '<img src="' + _tbase + i + '-' + _tlabels[i] + '.png"' +
                     ' alt="Stage ' + i + '" onerror="this.style.display=\'none\'">';
        }
        tattoos += '</div>';
      }

      var storyBtn = ch.storyUrl
        ? '<a href="' + ch.storyUrl + '" class="ch-story-link" style="border-color:' + rc + ';color:' + rc + ';">&#128214; Story</a>'
        : '<span style="font-size:.68em;color:var(--text-dim);opacity:.4;">Coming soon</span>';

      return (
        '<div class="ch-card" data-region="' + ch.region + '" data-state="' + ch.stateId + '">' +

          '<div class="ch-card-stripe" style="background:' + rc + ';"></div>' +

          /* Kingdom header */
          '<div class="ch-kingdom-head">' +
            '<div class="ch-badge-row">' +
              '<span class="ch-region-badge" style="color:' + rc + ';border-color:' + rc + ';">' + (rMeta.label || ch.region) + '</span>' +
              '<span class="ch-state-badge">' + ch.stateName + '</span>' +
            '</div>' +
            '<p class="ch-kingdom-name" style="color:' + rc + ';">' + ch.kingdomName + '</p>' +
            (ch.motto ? '<p class="ch-motto">&ldquo;' + ch.motto + '&rdquo;</p>' : '') +
          '</div>' +

          /* Portraits */
          '<div class="ch-portraits">' +
            '<div class="ch-portrait-cell">' +
              heroPortrait +
              '<div class="ch-portrait-label">' +
                '<div class="ch-portrait-role" style="color:' + rc + ';">&#9670; Hero</div>' +
                '<div class="ch-portrait-name" style="color:' + rc + ';">' + ch.hero.name + '</div>' +
                '<div class="ch-portrait-title">' + ch.hero.title + '</div>' +
              '</div>' +
            '</div>' +
            '<div class="ch-vs">VS</div>' +
            '<div class="ch-portrait-cell">' +
              villainPortrait +
              '<div class="ch-portrait-label">' +
                '<div class="ch-portrait-role" style="color:#ff7777;">&#9670; Villain</div>' +
                '<div class="ch-portrait-name" style="color:#ff9999;">' + ch.villain.name + '</div>' +
                '<div class="ch-portrait-title">' + ch.villain.title + '</div>' +
              '</div>' +
            '</div>' +
          '</div>' +

          /* Info row */
          '<div class="ch-info-row">' +
            (ch.animal ? '<div class="ch-info-item"><span class="ch-info-icon">&#127993;</span>' + ch.animal + '</div>' : '') +
            (ch.bird   ? '<div class="ch-info-item"><span class="ch-info-icon">&#128038;</span>' + ch.bird   + '</div>' : '') +
            (ch.hero.weapon ? '<div class="ch-info-item"><span class="ch-info-icon">&#9876;</span>' + ch.hero.weapon + '</div>' : '') +
          '</div>' +

          /* Footer */
          '<div class="ch-card-footer">' + tattoos + storyBtn + '</div>' +

        '</div>'
      );
    }

    /* ── Filter state ────────────────────────────────────────────── */
    var activeRegion = 'all';
    var activeState  = 'all';

    function renderGrid() {
      var visible = CHAPTERS.filter(function (ch) {
        if (activeRegion !== 'all' && ch.region  !== activeRegion) return false;
        if (activeState  !== 'all' && ch.stateId !== activeState)  return false;
        return true;
      });
      var grid = document.getElementById('chGrid');
      grid.innerHTML = visible.length
        ? visible.map(buildCard).join('')
        : '<div class="ch-empty">No characters found for this filter.</div>';
      document.getElementById('chCount').textContent =
        'Showing ' + visible.length + ' kingdom stor' + (visible.length === 1 ? 'y' : 'ies');
    }

    /* ── State bar (Level 2) ─────────────────────────────────────── */
    function renderStateBar(regionId) {
      var bar = document.getElementById('stateBar');
      bar.innerHTML = '';
      if (regionId === 'all') {
        bar.innerHTML = '<span class="ch-state-hint">Select a region above to filter by state</span>';
        return;
      }
      var rc = regionColor(regionId);

      function makeStateBtn(sid, label, isAll) {
        var btn = document.createElement('button');
        btn.className = 'ch-state-btn' + ((isAll ? activeState === 'all' : activeState === sid) ? ' active' : '');
        btn.textContent = label;
        btn.style.setProperty('--rc', rc);
        btn.addEventListener('click', function () {
          activeState = isAll ? 'all' : sid;
          bar.querySelectorAll('.ch-state-btn').forEach(function (b) { b.classList.remove('active'); });
          btn.classList.add('active');
          renderGrid();
        });
        bar.appendChild(btn);
      }

      makeStateBtn('', 'All States', true);
      var seen = {};
      CHAPTERS.filter(function (ch) { return ch.region === regionId; }).forEach(function (ch) {
        if (seen[ch.stateId]) return;
        seen[ch.stateId] = true;
        makeStateBtn(ch.stateId, ch.stateName, false);
      });
    }

    /* ── Region bar (Level 1) ────────────────────────────────────── */
    function buildRegionBar() {
      var bar = document.getElementById('regionBar');
      REGIONS.forEach(function (r) {
        var btn = document.createElement('button');
        btn.className = 'ch-region-btn' + (r.id === 'all' ? ' active' : '');
        btn.style.borderColor = r.color + '60';
        if (r.id === 'all') { btn.style.background = r.color; btn.style.color = '#000'; }
        if (r.sub) {
          btn.innerHTML = r.label + ' <span style="font-size:.75em;opacity:.65;">' + r.sub + '</span>';
        } else {
          btn.textContent = r.label;
        }
        btn.addEventListener('click', function () {
          activeRegion = r.id; activeState = 'all';
          bar.querySelectorAll('.ch-region-btn').forEach(function (b) {
            b.classList.remove('active'); b.style.background = 'none'; b.style.color = '';
          });
          btn.classList.add('active');
          btn.style.background = r.color; btn.style.color = '#000';
          renderStateBar(r.id);
          renderGrid();
        });
        bar.appendChild(btn);
      });
    }

    /* ── Init ───────────────────────────────────────────────────── */
    buildRegionBar();
    renderStateBar('all');
    renderGrid();

  }());
  </script>

</body>
</html>
