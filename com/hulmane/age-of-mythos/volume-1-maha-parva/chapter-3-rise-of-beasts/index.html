<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rise of Beasts — Maha Parva — Age of Mythos</title>
  <style>
    :root{--bg:#0d0a14;--ac:#c44daa;--text:#f0e8f8;--dim:#b8a8cc;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Georgia,serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;
    background-image:radial-gradient(ellipse at center,rgba(0,0,0,.3) 0%,transparent 70%);}
    .badge{font-size:.55em;letter-spacing:4px;text-transform:uppercase;color:var(--ac);opacity:.8;margin-bottom:16px;}
    h1{font-size:clamp(1.8em,4vw,3.2em);letter-spacing:4px;margin-bottom:10px;text-shadow:0 0 30px rgba(255,255,255,.08);}
    .sub{font-size:.75em;color:var(--dim);letter-spacing:2px;margin-bottom:30px;opacity:.8;}
    .desc{max-width:480px;font-size:.8em;color:var(--dim);line-height:1.7;margin:0 auto 32px;opacity:.75;}
    .tag{display:inline-block;font-size:.55em;letter-spacing:2px;text-transform:uppercase;padding:6px 20px;border-radius:24px;border:1px solid var(--ac);color:var(--ac);margin-bottom:24px;}
    a.back{font-size:.6em;letter-spacing:2px;text-transform:uppercase;color:var(--dim);text-decoration:none;opacity:.6;}
    a.back:hover{opacity:1;}
  </style>
</head>
<body>
  <div class="badge">Maha Parva &bull; Chapter Three</div>
  <h1>Rise of Beasts</h1>
  <div class="sub">Coming Soon</div>
  <p class="desc">Heroes and monsters equalize. Region by region the 30 legends narrow to 6. Each bonds with an ancient beast of the continent as the mythic trials unfold.</p>
  <span class="tag">In Development</span><br>
  <a href="../index.html" class="back">&#8592; Back to Maha Parva</a>
</body>
</html>
