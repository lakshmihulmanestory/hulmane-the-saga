<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kingdom Identities &mdash; Age of Mythos Volume I</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Shell */
    .ki-shell { display:flex; gap:0; min-height:calc(100vh - 64px); margin-top:64px; }

    /* Sidebar */
    .ki-sidebar {
      width:230px; flex-shrink:0;
      background:rgba(0,0,0,.55);
      border-right:1px solid var(--border-dim);
      overflow-y:auto;
      position:sticky; top:64px;
      height:calc(100vh - 64px);
      padding:12px 8px;
    }
    .ki-sidebar-title { font-size:.58em; text-transform:uppercase; letter-spacing:2px; color:var(--text-dim); margin-bottom:12px; padding-left:6px; opacity:.6; }
    .ki-region-label  { font-size:.56em; text-transform:uppercase; letter-spacing:2px; color:var(--text-dim); padding:8px 6px 3px; opacity:.4; }
    .ki-kingdom-btn {
      display:flex; align-items:center; gap:8px;
      width:100%; background:none; border:1px solid transparent; border-radius:7px;
      padding:6px 8px; cursor:pointer; text-align:left; margin-bottom:2px;
      transition:background .15s, border-color .15s;
    }
    .ki-kingdom-btn:hover { background:rgba(255,255,255,.05); }
    .ki-kingdom-btn.active { border-color:var(--kingdom-color,var(--gold)); background:rgba(255,215,0,.06); }
    .ki-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .ki-btn-name  { font-size:.76em; color:var(--text); font-family:Georgia,serif; line-height:1.2; }
    .ki-btn-sub   { font-size:.58em; color:var(--text-dim); display:block; opacity:.55; }

    /* Right panel */
    .ki-detail { flex:1; overflow-y:auto; padding:0 0 80px; min-width:0; }

    /* Header inside detail panel */
    .ki-header {
      padding:32px 32px 24px;
      border-bottom:1px solid var(--border-dim);
      background:rgba(0,0,0,.2);
    }
    .ki-header .kingdom-name { font-size:1.6em; color:var(--gold); margin-bottom:.1em; }
    .ki-header .state-name { font-size:.75em; color:var(--text-dim); opacity:.6; margin-bottom:8px; }
    .ki-header .theme-text { font-size:.82em; color:var(--text-dim); font-style:italic; line-height:1.6; max-width:700px; }

    /* Sections */
    .ki-section { padding:24px 32px; border-bottom:1px solid var(--border-dim); }
    .ki-section-label { font-size:.6em; letter-spacing:3px; text-transform:uppercase; color:var(--text-dim); opacity:.5; margin-bottom:14px; }
    .ki-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    @media(max-width:700px){ .ki-grid-2 { grid-template-columns:1fr; } }

    .ki-field-label { font-size:.6em; text-transform:uppercase; letter-spacing:2px; color:var(--text-dim); opacity:.5; margin-bottom:2px; }
    .ki-field-value { font-size:.86em; color:var(--text-dim); line-height:1.6; margin-bottom:12px; }
    .ki-field-value strong { color:var(--text); }

    .ki-hero-portrait { width:100%; max-width:260px; border-radius:10px; border:1px solid var(--border-dim); display:block; margin-bottom:10px; }
    .ki-emblem-img    { width:130px; height:130px; object-fit:contain; border-radius:10px; border:1px solid var(--border-dim); display:block; margin:0 auto; background:rgba(0,0,0,.3); padding:6px; }

    /* Compact square media card: image left, details right */
    .ki-media-card { display:flex; gap:14px; align-items:flex-start; margin-bottom:4px; }
    .ki-media-card .ki-sq-img {
      width:120px; height:120px; flex-shrink:0;
      object-fit:cover; border-radius:8px;
      border:1px solid var(--border-dim);
      background:rgba(255,255,255,.03);
      display:block;
    }
    .ki-media-card .ki-sq-details { flex:1; min-width:0; }
    .ki-media-card .ki-sq-name { font-size:.82em; color:var(--gold); margin-bottom:3px; font-family:Georgia,serif; }
    .ki-media-card .ki-sq-type { font-size:.68em; color:var(--text-dim); opacity:.65; margin-bottom:5px; letter-spacing:.5px; }
    .ki-media-card .ki-sq-ability { font-size:.75em; color:var(--text-dim); line-height:1.55; }

    .ki-enter-link {
      display:inline-block; margin-top:16px;
      padding:8px 20px; border-radius:20px;
      border:1px solid var(--gold-dim);
      color:var(--gold); font-size:.72em; letter-spacing:1px;
      text-decoration:none; transition:background .15s;
    }
    .ki-enter-link:hover { background:rgba(255,215,0,.08); }

    .ki-empty {
      display:flex; align-items:center; justify-content:center;
      min-height:60vh; color:var(--text-dim); font-size:.9em; opacity:.5;
      font-style:italic; text-align:center; padding:40px;
    }

    .food-chip { display:inline-block; font-size:.65em; padding:3px 9px; border-radius:10px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); color:var(--text-dim); margin:2px; }

    /* Modern Power Drivers */
    .mpd-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; margin-top:10px; }
    .mpd-card {
      border-radius:9px; padding:12px 14px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
    }
    .mpd-icon { font-size:1.4em; margin-bottom:5px; }
    .mpd-title { font-size:.68em; font-weight:bold; color:var(--gold); letter-spacing:.5px; margin-bottom:3px; }
    .mpd-tags  { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
    .mpd-tag   { font-size:.58em; padding:2px 7px; border-radius:8px; border:1px solid rgba(255,255,255,.1); color:var(--text-dim); background:rgba(255,255,255,.03); }
    .mpd-desc  { font-size:.7em; color:var(--text-dim); line-height:1.5; opacity:.8; }
    .mpd-phase { font-size:.6em; letter-spacing:2px; text-transform:uppercase; color:var(--gold-dim); opacity:.55; margin-bottom:12px; }

    @media(max-width:768px){
      .ki-sidebar { display:none; }
      .ki-shell { flex-direction:column; margin-top:60px; }
    }
  </style>
</head>
<body>

  <nav class="maha-nav">
    <a href="../../../../index.html" class="nav-logo">Age of Mythos</a>
    <div class="nav-links">
      <a href="index.html">Volume I</a>
      <a href="kingdoms.html">Kingdoms</a>
      <a href="identity.html" class="active">Identities</a>
      <a href="characters.html">Heroes</a>
      <a href="systems.html">Systems</a>
      <a href="council.html">Council</a>
      <a href="bharatavarsha/global-map.html">Map</a>
    </div>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('nav-open')">&#9776;</button>
  </nav>

  <div class="ki-shell">

    <!-- Sidebar -->
    <div class="ki-sidebar" id="kiSidebar"></div>

    <!-- Detail panel -->
    <div class="ki-detail" id="kiDetail">
      <div class="ki-empty">
        Select a kingdom from the sidebar to view its identity.
      </div>
    </div>

  </div>

  <script src="js/kingdom-identity-data.js"></script>
  <script>
    const REGION_COLORS = {
      south:'#44ff88', west:'#ff8c00', east:'#44aaff',
      north:'#ff66cc', northeast:'#aa66ff', central:'#ffaa00'
    };
    const REGION_ORDER = ['south','west','east','north','northeast','central'];

    function kingdomSlug(name) {
      return name.split('—')[0].trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
    }

    function kingdomPagePath(k) {
      return `bharatavarsha/regions/${k.region}/${kingdomSlug(k.kingdomName)}/`;
    }

    // Build sidebar
    function buildSidebar() {
      const sb = document.getElementById('kiSidebar');
      let html = `<div class="ki-sidebar-title">Kingdom Identities</div>`;
      for (const region of REGION_ORDER) {
        const kingdoms = (window.KINGDOM_IDENTITY||[]).filter(k=>k.region===region);
        if (!kingdoms.length) continue;
        html += `<div class="ki-region-label">${region.toUpperCase()}</div>`;
        for (const k of kingdoms) {
          const color = REGION_COLORS[k.region];
          html += `
            <button class="ki-kingdom-btn" data-id="${k.id}"
              style="--kingdom-color:${color}" onclick="showKingdom('${k.id}')">
              <div class="ki-dot" style="background:${color}"></div>
              <div>
                <div class="ki-btn-name">${k.kingdomName.split('—')[0].trim()}</div>
                <div class="ki-btn-sub">${k.state}</div>
              </div>
            </button>`;
        }
      }
      sb.innerHTML = html;
    }

    // Image helper — hides the <img> if the file doesn't load
    function img(src, alt, cls) {
      return `<img src="${src}" alt="${alt}" class="${cls}" onerror="this.style.display='none'">`;
    }

    function showKingdom(id) {
      const k = (window.KINGDOM_IDENTITY||[]).find(x=>x.id===id);
      if (!k) return;
      const color = REGION_COLORS[k.region];
      const base  = kingdomPagePath(k);  // e.g. "bharatavarsha/regions/south/vijayanagara-reborn/"

      // Helper: convert a weapon/vehicle name → filename slug
      function mediaSlug(name) {
        if (!name) return '';
        return name.replace(/\s*\([^)]*\)/g,'').trim()
          .toLowerCase().replace(/[.\s]+/g,'-')
          .replace(/[^a-z0-9-]/g,'').replace(/-+/g,'-').replace(/^-|-$/g,'');
      }
      // Kingdom slug (used in emblem filename)
      const kSlug = k.kingdomName.split('—')[0].trim().toLowerCase()
        .replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');

      // Weapon & vehicle slugs from data
      const wAncSlug = k.weapons ? mediaSlug(k.weapons.ancient.name) : '';
      const wModSlug = k.weapons ? mediaSlug(k.weapons.modern.name)  : '';
      const vAncSlug = k.vehicles ? mediaSlug(k.vehicles.ancient.name) : '';
      const vModSlug = k.vehicles ? mediaSlug(k.vehicles.modern.name)  : '';

      // Image paths — descriptive names matching renamed files
      const emblemSrc   = `${base}media/emblem/${id}-${kSlug}-emblem.png`;
      const portraitSrc = `${base}media/portraits/${id}-hero-portrait.png`;
      const villainSrc  = `${base}media/portraits/${id}-villain-portrait.png`;
      const weaponAnc   = `${base}media/weapons/${id}-weapon-${wAncSlug}-ancient.png`;
      const weaponMod   = `${base}media/weapons/${id}-weapon-${wModSlug}-modern.png`;
      const vehAnc      = `${base}media/vehicles/${id}-vehicle-${vAncSlug}-ancient.png`;
      const vehMod      = `${base}media/vehicles/${id}-vehicle-${vModSlug}-modern.png`;

      // Sidebar active state
      document.querySelectorAll('.ki-kingdom-btn').forEach(b=>b.classList.remove('active'));
      const btn = document.querySelector(`.ki-kingdom-btn[data-id="${id}"]`);
      if (btn) btn.classList.add('active');

      const detail = document.getElementById('kiDetail');
      detail.innerHTML = `
        <!-- Header -->
        <div class="ki-header" style="border-left:4px solid ${color};">
          <div class="ki-grid-2" style="align-items:center;">
            <div>
              <div class="kingdom-name">${k.kingdomName.split('—')[0].trim()}</div>
              <div class="state-name">${k.state} &bull; ${k.region.charAt(0).toUpperCase()+k.region.slice(1)} Region</div>
              <div class="theme-text">&ldquo;${k.theme}&rdquo;</div>
              <a href="${base}index.html" class="ki-enter-link" style="margin-top:14px;">Enter Kingdom &rarr;</a>
            </div>
            <div style="text-align:center;">
              ${img(emblemSrc,'Kingdom Emblem','ki-emblem-img')}
            </div>
          </div>
        </div>

        <!-- Hero -->
        <div class="ki-section">
          <div class="ki-section-label">The Hero</div>
          <div class="ki-grid-2">
            <div>
              ${img(portraitSrc, k.hero.name,'ki-hero-portrait')}
            </div>
            <div>
              <div class="ki-field-label">Name</div>
              <div class="ki-field-value"><strong>${k.hero.name}</strong></div>
              <div class="ki-field-label">Title</div>
              <div class="ki-field-value">${k.hero.title}</div>
              <div class="ki-field-label">Sacred Animal</div>
              <div class="ki-field-value">
                <strong style="color:${color}">${k.animal.name}</strong>
                (${k.animal.scientific})<br>
                <span style="font-size:.9em;opacity:.8;">${k.animal.symbolism}</span>
              </div>
              <div class="ki-field-label">Sacred Bird</div>
              <div class="ki-field-value">${k.bird.name} &mdash; ${k.bird.symbolism}</div>
              <div class="ki-field-label">Power</div>
              <div class="ki-field-value">${k.animal.power}</div>
              <div class="ki-field-label">Attire</div>
              <div class="ki-field-value">${k.dress}</div>
            </div>
          </div>
        </div>

        <!-- Weapons — compact square cards -->
        <div class="ki-section">
          <div class="ki-section-label">Sacred Weapons</div>
          <div class="ki-grid-2">
            <div class="ki-media-card">
              <img src="${weaponAnc}" alt="Ancient Weapon" class="ki-sq-img" onerror="this.style.display='none'">
              <div class="ki-sq-details">
                <div class="ki-field-label">Ancient</div>
                <div class="ki-sq-name">${k.weapons.ancient.name}</div>
                <div class="ki-sq-type">${k.weapons.ancient.type}</div>
                <div class="ki-sq-ability">${k.weapons.ancient.ability}</div>
              </div>
            </div>
            <div class="ki-media-card">
              <img src="${weaponMod}" alt="Modern Weapon" class="ki-sq-img" onerror="this.style.display='none'">
              <div class="ki-sq-details">
                <div class="ki-field-label">Modern</div>
                <div class="ki-sq-name">${k.weapons.modern.name}</div>
                <div class="ki-sq-type">${k.weapons.modern.type}</div>
                <div class="ki-sq-ability">${k.weapons.modern.ability}</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Vehicles — compact square cards -->
        <div class="ki-section">
          <div class="ki-section-label">Kingdom Vehicles</div>
          <div class="ki-grid-2">
            <div class="ki-media-card">
              <img src="${vehAnc}" alt="Ancient Vehicle" class="ki-sq-img" onerror="this.style.display='none'">
              <div class="ki-sq-details">
                <div class="ki-field-label">Ancient</div>
                <div class="ki-sq-name">${k.vehicles.ancient.name}</div>
                <div class="ki-sq-ability">${k.vehicles.ancient.desc}</div>
              </div>
            </div>
            <div class="ki-media-card">
              <img src="${vehMod}" alt="Modern Vehicle" class="ki-sq-img" onerror="this.style.display='none'">
              <div class="ki-sq-details">
                <div class="ki-field-label">Modern</div>
                <div class="ki-sq-name">${k.vehicles.modern.name}</div>
                <div class="ki-sq-ability">${k.vehicles.modern.desc}</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Culture & Cuisine -->
        <div class="ki-section">
          <div class="ki-section-label">Culture &amp; Sacred Cuisine</div>
          <div class="ki-grid-2">
            <div>
              <div class="ki-field-label">Heritage</div>
              <div class="ki-field-value">${k.culture}</div>
            </div>
            <div>
              <div class="ki-field-label">Sacred Foods</div>
              <div class="ki-field-value">${(k.food||[]).map(f=>`<span class="food-chip">${f}</span>`).join('')}</div>
            </div>
          </div>
        </div>

        <!-- Modern Power Drivers -->
        <div class="ki-section">
          <div class="ki-section-label">Modern Power Drivers &mdash; Phase I: Bharatavarsha</div>
          <div class="mpd-phase">How power is gained in the modern era &bull; Phase I within one nation</div>

          <div class="mpd-grid">
            <div class="mpd-card" style="border-color:rgba(255,215,0,.2);">
              <div class="mpd-icon">⚡</div>
              <div class="mpd-title">Economic Power</div>
              <div class="mpd-desc">Control of energy, trade, and supply chains. Whoever controls oil, gas, food, and water controls the pace of war and peace.</div>
              <div class="mpd-tags">
                <span class="mpd-tag">Oil &amp; Gas</span>
                <span class="mpd-tag">Trade Routes</span>
                <span class="mpd-tag">Food Supply</span>
                <span class="mpd-tag">Water Rights</span>
              </div>
            </div>
            <div class="mpd-card" style="border-color:rgba(68,170,255,.2);">
              <div class="mpd-icon">🛰️</div>
              <div class="mpd-title">Technology Power</div>
              <div class="mpd-desc">Satellites, internet infrastructure, AI, and communications networks. He who controls the signal controls the story.</div>
              <div class="mpd-tags">
                <span class="mpd-tag">Satellites</span>
                <span class="mpd-tag">Internet</span>
                <span class="mpd-tag">AI</span>
                <span class="mpd-tag">Comms Infrastructure</span>
              </div>
            </div>
            <div class="mpd-card" style="border-color:rgba(170,102,255,.2);">
              <div class="mpd-icon">🎵</div>
              <div class="mpd-title">Soft Power</div>
              <div class="mpd-desc">Music, cinema, media, and social media. Cultural exports that shape minds without a single weapon drawn.</div>
              <div class="mpd-tags">
                <span class="mpd-tag">Music</span>
                <span class="mpd-tag">Cinema</span>
                <span class="mpd-tag">Social Media</span>
                <span class="mpd-tag">Cultural Export</span>
              </div>
            </div>
            <div class="mpd-card" style="border-color:rgba(255,140,0,.2);">
              <div class="mpd-icon">🌐</div>
              <div class="mpd-title">Geopolitical Power</div>
              <div class="mpd-desc">Alliances, borders, and international leverage. Who you stand with — and who owes you — determines your reach.</div>
              <div class="mpd-tags">
                <span class="mpd-tag">Alliances</span>
                <span class="mpd-tag">Diplomacy</span>
                <span class="mpd-tag">Sanctions</span>
                <span class="mpd-tag">Strategic Bases</span>
              </div>
            </div>
            <div class="mpd-card" style="border-color:rgba(68,255,136,.2);">
              <div class="mpd-icon">👥</div>
              <div class="mpd-title">People Power</div>
              <div class="mpd-desc">Popularity, public trust, and grassroots movements. The people are the final weapon — and the final judge.</div>
              <div class="mpd-tags">
                <span class="mpd-tag">Public Sentiment</span>
                <span class="mpd-tag">Movements</span>
                <span class="mpd-tag">Narrative Control</span>
                <span class="mpd-tag">Votes &amp; Voice</span>
              </div>
            </div>
          </div>

          ${(()=>{
            if (!k.modernArsenal && !k.geopolitics) return '';
            let s = '<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border-dim);">';
            s += '<div class="ki-field-label" style="margin-bottom:10px;">This Kingdom\'s Modern Arsenal</div>';
            if (k.modernArsenal) {
              s += '<div class="ki-grid-2" style="margin-bottom:10px;">';
              s += '<div style="padding:10px 12px;border-radius:8px;background:rgba(68,255,136,.06);border-left:2px solid #44ff88;">';
              s += '<div style="font-size:.6em;text-transform:uppercase;letter-spacing:1.5px;color:#44ff88;margin-bottom:4px;opacity:.8;">Hero</div>';
              s += '<div style="font-size:.78em;color:var(--text-dim);line-height:1.6;">' + k.modernArsenal.hero + '</div>';
              s += '</div>';
              s += '<div style="padding:10px 12px;border-radius:8px;background:rgba(255,68,68,.06);border-left:2px solid #ff4444;">';
              s += '<div style="font-size:.6em;text-transform:uppercase;letter-spacing:1.5px;color:#ff4444;margin-bottom:4px;opacity:.8;">Villain</div>';
              s += '<div style="font-size:.78em;color:var(--text-dim);line-height:1.6;">' + k.modernArsenal.villain + '</div>';
              s += '</div></div>';
            }
            if (k.geopolitics) {
              s += '<div style="padding:10px 12px;border-radius:8px;background:rgba(255,170,0,.05);border-left:2px solid #ffaa00;">';
              s += '<div style="font-size:.6em;text-transform:uppercase;letter-spacing:1.5px;color:#ffaa00;margin-bottom:4px;opacity:.8;">Geopolitical Context</div>';
              s += '<div style="font-size:.78em;color:var(--text-dim);line-height:1.6;font-style:italic;">' + k.geopolitics + '</div>';
              s += '</div>';
            }
            s += '</div>';
            return s;
          })()}
        </div>

        <!-- Page links -->
        <div class="ki-section">
          <a href="${base}identity.html" class="ki-enter-link" style="margin-right:10px;">Full Identity Page</a>
          <a href="${base}story.html" class="ki-enter-link" style="margin-right:10px;border-color:var(--border);">Story</a>
          <a href="${base}rules.html" class="ki-enter-link" style="border-color:var(--border);">Rules &amp; Weapons</a>
        </div>
      `;
      detail.scrollTop = 0;
    }

    buildSidebar();
  </script>

</body>
</html>
