<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Region &mdash; MahaHulmane</title>
  <link rel="stylesheet" href="../../../../css/style.css">
  <style>
    .breadcrumb { padding: 70px 20px 0; max-width: 1200px; margin: 0 auto; }
    .breadcrumb a { color: var(--gold-dim); text-decoration: none; font-size: 0.8rem; }
    .breadcrumb a:hover { color: var(--gold); }
    .breadcrumb span { color: var(--text-dim); font-size: 0.8rem; margin: 0 6px; }
    .breadcrumb .current { color: var(--gold); font-weight: bold; }

    .region-banner { text-align: center; padding: 30px 20px 50px; }
    .region-banner h1 { font-size: 2.5rem; margin-bottom: 8px; }
    .region-banner .r-sub { color: var(--text-dim); font-size: 1rem; max-width: 600px; margin: 0 auto; line-height: 1.7; }

    .region-content { max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; }

    .state-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }
    .state-card {
      background: linear-gradient(135deg, rgba(43, 26, 0, 0.5), rgba(26, 10, 0, 0.7));
      border: 1px solid var(--border-dim);
      border-radius: 12px;
      padding: 25px;
      text-decoration: none;
      display: block;
      transition: all 0.3s;
    }
    .state-card:hover {
      border-color: var(--gold);
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(255, 215, 0, 0.1);
    }
    .state-card .sc-kingdom { color: var(--gold); font-size: 1.15rem; font-weight: bold; margin-bottom: 2px; }
    .state-card .sc-state { color: var(--text); font-size: 0.9rem; margin-bottom: 8px; }
    .state-card .sc-motto { color: var(--text-dim); font-style: italic; font-size: 0.8rem; margin-bottom: 12px; }
    .sc-creatures {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .sc-badge {
      padding: 3px 12px;
      border-radius: 12px;
      font-size: 0.7rem;
      border: 1px solid var(--border-dim);
      color: var(--text-dim);
    }
    .sc-chars {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .sc-chars .sc-hero { color: #44ff88; font-size: 0.8rem; }
    .sc-chars .sc-villain { color: #ff6666; font-size: 0.8rem; }
    .sc-chars .sc-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
    .sc-arrow { color: var(--gold-dim); font-size: 0.85rem; margin-top: 12px; display: block; }

    .back-links {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 40px;
      flex-wrap: wrap;
    }
    .back-links a {
      padding: 10px 24px;
      border: 1px solid var(--gold-dim);
      border-radius: 20px;
      color: var(--gold);
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.3s;
    }
    .back-links a:hover { background: rgba(255, 215, 0, 0.1); }

    .stats-row {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .stats-row .sr-item { text-align: center; }
    .stats-row .sr-num { color: var(--gold); font-size: 1.8rem; font-weight: bold; display: block; }
    .stats-row .sr-label { color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }

    .other-regions { margin-top: 50px; padding-top: 30px; border-top: 1px solid var(--border-dim); }
    .other-regions h3 { color: var(--gold-dim); font-size: 1rem; text-align: center; margin-bottom: 15px; }
    .or-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
    .or-links a {
      padding: 8px 18px;
      border: 1px solid var(--border-dim);
      border-radius: 20px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.85rem;
      transition: all 0.3s;
    }
    .or-links a:hover { border-color: var(--gold); color: var(--gold); }
    .or-links a.current { border-color: var(--gold); color: var(--gold); pointer-events: none; }
  </style>
</head>
<body>

  <nav class="maha-nav">
    <a href="../../../../index.html" class="nav-logo">MahaHulmane</a>
    <div class="nav-links">
      <a href="../../../../index.html">Home</a>
      <a href="../../../../characters.html">Heroes</a>
      <a href="../../../../state-stories.html">Kingdoms</a>
      <a href="../../../../regions.html">Regions</a>
      <a href="../../../../council.html">Council</a>
      <a href="../../../../story.html">Story</a>
      <a href="../../../../tattoo-system.html">Tattoos</a>
    </div>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('nav-open')">&#9776;</button>
  </nav>

  <div class="breadcrumb" id="breadcrumb"></div>
  <section class="region-banner" id="banner"></section>
  <div class="region-content" id="content">
    <p style="color:var(--text-dim); text-align:center; padding:60px 0;">Loading region data...</p>
  </div>

  <script src="../../../../js/state-stories-data.js"></script>
  <script>
    (function() {
      var path = window.location.pathname.replace(/\/index\.html$/, '').replace(/\/$/, '');
      var parts = path.split('/').filter(Boolean);
      var regionId = parts[parts.length - 1];

      var regionInfo = {
        south:     { name: 'Dakshinapatha', label: 'The Southern Kingdoms', color: '#44ff88', desc: 'Five kingdoms forged by rivers, temples, and the ancient pride of Dravidian civilization. From the whip-swords of Amaravati to the elephant maces of Vijayanagara, the South fights with patient ferocity.' },
        west:      { name: 'Paschimapatha', label: 'The Western Kingdoms', color: '#ff8c00', desc: 'Four kingdoms where lions roar across salt deserts, giant squirrels leap between mountain forts, and the ocean itself takes sides. Trade and warfare merge in the West.' },
        east:      { name: 'Purvapatha', label: 'The Eastern Kingdoms', color: '#44aaff', desc: 'Four kingdoms where the Ganga meets the swamp, where fishing cats hunt in mangroves, and where the wheel of dharma turns eternal. The East builds what the world destroys.' },
        north:     { name: 'Uttarapatha', label: 'The Northern Kingdoms', color: '#ff66cc', desc: 'Five kingdoms spanning the Himalayan heights to the sacred Ganga plains. Snow leopards, musk deer, and the ghosts of Kurukshetra guard these ancient lands of dharma and destiny.' },
        northeast: { name: 'Pragjyotisha', label: 'The Northeastern Kingdoms', color: '#aa66ff', desc: 'Eight kingdoms of dawn-lit hills, floating lakes, and warrior traditions older than recorded history. The Northeast holds the most diverse and mystical powers in the MahaHulmane.' },
        central:   { name: 'Madhyadesa', label: 'The Central Kingdoms', color: '#ffaa00', desc: 'Two kingdoms at the very heart of Bharatavarsha. Hold the center, and the edges cannot fall. The Central lands are where chess was invented and where serpents whisper philosophy.' }
      };

      var allRegions = ['south', 'west', 'east', 'north', 'northeast', 'central'];

      var info = regionInfo[regionId];
      if (!info) {
        document.getElementById('content').innerHTML = '<p style="color:#ff4444;text-align:center;">Region not found.</p>';
        return;
      }

      var states = STATE_KINGDOMS.filter(function(k) { return k.region === regionId; });

      document.title = info.name + ' \u2014 MahaHulmane';

      document.getElementById('breadcrumb').innerHTML =
        '<a href="../../../../state-stories.html">All Kingdoms</a><span>&rsaquo;</span>' +
        '<a href="../../index.html">India</a><span>&rsaquo;</span>' +
        '<span class="current">' + info.label + '</span>';

      document.getElementById('banner').innerHTML =
        '<h1 style="color:' + info.color + ';">' + info.name + '</h1>' +
        '<div class="r-sub">' + info.desc + '</div>';

      var html = '';

      // Stats
      var totalWarriors = 0;
      states.forEach(function(s) { totalWarriors += (s.warriors ? s.warriors.length : 0); });
      html += '<div class="stats-row">' +
        '<div class="sr-item"><span class="sr-num">' + states.length + '</span><span class="sr-label">Kingdoms</span></div>' +
        '<div class="sr-item"><span class="sr-num">' + states.length + '</span><span class="sr-label">Heroes</span></div>' +
        '<div class="sr-item"><span class="sr-num">' + states.length + '</span><span class="sr-label">Villains</span></div>' +
        '<div class="sr-item"><span class="sr-num">' + states.length + '</span><span class="sr-label">Gurus</span></div>' +
        '<div class="sr-item"><span class="sr-num">' + totalWarriors + '</span><span class="sr-label">Warriors</span></div>' +
      '</div>';

      // State cards
      html += '<div class="state-cards">';
      states.forEach(function(k) {
        html += '<a href="' + k.stateId + '/index.html" class="state-card" style="border-left: 3px solid ' + info.color + ';">' +
          '<div class="sc-kingdom">' + k.kingdomName + '</div>' +
          '<div class="sc-state">' + k.stateName + '</div>' +
          '<div class="sc-motto">&ldquo;' + k.motto + '&rdquo;</div>' +
          '<div class="sc-creatures">' +
            '<span class="sc-badge">' + k.animal.name + '</span>' +
            '<span class="sc-badge">' + k.bird.name + '</span>' +
          '</div>' +
          '<div class="sc-chars">' +
            '<div><div class="sc-label">Hero</div><div class="sc-hero">' + k.hero.name + '</div></div>' +
            '<div><div class="sc-label">Villain</div><div class="sc-villain">' + k.villain.name + '</div></div>' +
          '</div>' +
          '<span class="sc-arrow">Explore kingdom &rarr;</span>' +
        '</a>';
      });
      html += '</div>';

      // Other regions
      html += '<div class="other-regions"><h3>Other Regions</h3><div class="or-links">';
      allRegions.forEach(function(r) {
        var ri = regionInfo[r];
        var cls = r === regionId ? ' class="current"' : '';
        html += '<a href="../' + r + '/index.html"' + cls + ' style="--c:' + ri.color + ';">' + ri.name + '</a>';
      });
      html += '</div></div>';

      // Back links
      html += '<div class="back-links">' +
        '<a href="../../index.html">&larr; India Overview</a>' +
        '<a href="../../../../state-stories.html">&larr; All Kingdoms</a>' +
      '</div>';

      document.getElementById('content').innerHTML = html;
    })();
  </script>

</body>
</html>
