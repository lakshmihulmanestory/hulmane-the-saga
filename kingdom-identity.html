<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kingdom Identities &mdash; Hulmane-The-Saga</title>
  <link rel="stylesheet" href="css/style.css">
  <style>

    /* ── Shell layout ── */
    .ki-shell { display:flex; gap:0; min-height:calc(100vh - 64px); margin-top:64px; }

    /* ── Sidebar ── */
    .ki-sidebar {
      width:240px; flex-shrink:0;
      background:rgba(0,0,0,0.55);
      border-right:1px solid var(--border-dim);
      overflow-y:auto;
      position:sticky; top:64px;
      height:calc(100vh - 64px);
      padding:14px 10px;
    }
    .ki-sidebar-title { font-size:.6em; text-transform:uppercase; letter-spacing:2px; color:var(--text-dim); margin-bottom:12px; padding-left:4px; }
    .ki-region-label  { font-size:.58em; text-transform:uppercase; letter-spacing:2px; color:var(--text-dim); padding:8px 4px 3px; opacity:.5; }
    .ki-kingdom-btn {
      display:flex; align-items:center; gap:8px;
      width:100%; background:none; border:1px solid transparent; border-radius:7px;
      padding:6px 8px; cursor:pointer; text-align:left; margin-bottom:2px;
      transition:background .15s, border-color .15s;
    }
    .ki-kingdom-btn:hover { background:rgba(255,255,255,.05); }
    .ki-kingdom-btn.active { border-color:var(--kingdom-color,var(--gold)); background:rgba(255,215,0,.06); }
    .ki-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .ki-btn-name  { font-size:.78em; color:var(--text); font-family:Georgia,serif; line-height:1.2; }
    .ki-btn-sub   { font-size:.6em;  color:var(--text-dim); display:block; opacity:.65; }

    /* ── Right panel ── */
    .ki-detail { flex:1; overflow-y:auto; padding:0 0 60px; min-width:0; }

    /* ── Category view bar ── */
    .ki-viewbar {
      display:flex; align-items:center; gap:6px; flex-wrap:wrap;
      padding:10px 24px; border-bottom:1px solid var(--border-dim);
      background:rgba(0,0,0,.3); position:sticky; top:0; z-index:10;
    }
    .ki-viewbar-label { font-size:.6em; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-dim); margin-right:4px; }
    .ki-view-btn {
      padding:4px 12px; border-radius:20px; border:1px solid var(--border-dim);
      background:none; cursor:pointer; color:var(--text-dim);
      font-size:.72em; transition:all .15s;
    }
    .ki-view-btn:hover { border-color:var(--gold); color:var(--text); }
    .ki-view-btn.active { border-color:var(--gold); background:rgba(255,215,0,.1); color:var(--gold); font-weight:bold; }

    /* ── Breadcrumb ── */
    .ki-breadcrumb {
      display:flex; align-items:center; flex-wrap:wrap; gap:2px;
      font-size:.72em; padding:10px 32px 0;
    }
    .ki-breadcrumb a { text-decoration:none; opacity:.7; }
    .ki-breadcrumb a:hover { opacity:1; }
    .ki-sep { margin:0 4px; opacity:.35; }

    /* ── Banner ── */
    .ki-banner {
      padding:22px 32px 20px; border-bottom:1px solid var(--border-dim);
      position:relative; overflow:hidden;
    }
    .ki-banner::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse at 80% 50%, var(--kp,#44ff88) 0%, transparent 65%);
      opacity:.06; pointer-events:none;
    }
    .ki-region-badge {
      display:inline-block; font-size:.58em; text-transform:uppercase;
      letter-spacing:2px; padding:2px 9px; border-radius:20px; border:1px solid currentColor;
      margin-bottom:8px;
    }
    .ki-kingdom-name   { font-size:1.6rem; font-family:Georgia,serif; color:var(--kp,var(--gold)); margin:0 0 4px; line-height:1.2; }
    .ki-hero-line      { font-size:.85em; color:var(--text-dim); margin-bottom:6px; }
    .ki-theme          { font-size:.82em; color:var(--text); font-style:italic; max-width:580px; line-height:1.6; opacity:.8; }
    .ki-landscape      { font-size:.72em; color:var(--text-dim); margin-top:6px; opacity:.6; }

    /* Banner action row */
    .ki-banner-actions { display:flex; align-items:center; gap:10px; margin-top:14px; flex-wrap:wrap; }
    .ki-story-btn {
      display:inline-flex; align-items:center; gap:6px;
      padding:6px 16px; border-radius:20px; border:1px solid var(--kp,var(--gold));
      color:var(--kp,var(--gold)); background:none; cursor:pointer;
      font-size:.75em; text-decoration:none; transition:background .15s;
    }
    .ki-story-btn:hover { background:rgba(255,215,0,.08); }
    .ki-colour-pill {
      display:inline-flex; align-items:center; gap:5px;
      padding:3px 10px; border-radius:20px;
      border:1px solid rgba(255,255,255,.1);
      font-size:.65em; font-family:monospace; color:var(--text-dim);
    }
    .ki-swatch { width:10px; height:10px; border-radius:50%; display:inline-block; }

    /* ── Identity grid ── */
    .ki-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(290px,1fr));
      gap:18px; padding:22px 32px;
    }
    .ki-card {
      background:rgba(0,0,0,.32); border:1px solid var(--border-dim);
      border-radius:12px; padding:18px; position:relative; overflow:hidden;
    }
    .ki-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--kp,var(--gold)); opacity:.45; }
    .ki-card-icon   { font-size:1.3em; margin-bottom:6px; display:block; }
    .ki-card-label  { font-size:.57em; text-transform:uppercase; letter-spacing:2px; color:var(--kp,var(--gold)); margin-bottom:6px; opacity:.75; }
    .ki-card-title  { font-size:.95em; font-family:Georgia,serif; color:var(--text); margin-bottom:3px; }
    .ki-card-sub    { font-size:.76em; color:var(--text-dim); line-height:1.4; margin-bottom:7px; font-style:italic; }
    .ki-card-body   { font-size:.78em; color:var(--text); line-height:1.62; opacity:.85; }
    .ki-weapon-row  { padding:7px 0; border-top:1px solid rgba(255,255,255,.05); }
    .ki-weapon-era  { font-size:.6em; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); margin-bottom:2px; opacity:.6; }
    .ki-food-list   { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:4px; }
    .ki-food-list li { font-size:.77em; color:var(--text); padding:3px 8px; background:rgba(255,255,255,.04); border-radius:4px; border-left:2px solid var(--kp,var(--gold)); opacity:.85; }

    /* ── Specialty card ratings ── */
    .ki-rating-row  { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
    .ki-rating-label { font-size:.68em; color:var(--text-dim); width:62px; flex-shrink:0; }
    .ki-rating-bar  { flex:1; height:5px; border-radius:3px; background:rgba(255,255,255,.08); overflow:hidden; }
    .ki-rating-fill { height:100%; border-radius:3px; background:var(--kp,var(--gold)); }
    .ki-tag-list    { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
    .ki-tag         { font-size:.62em; padding:2px 8px; border-radius:12px; border:1px solid var(--kp,var(--gold)); color:var(--kp,var(--gold)); opacity:.75; }
    .ki-tag.weak    { border-color:#ff4444; color:#ff6666; }

    /* ── Tattoo section ── */
    .ki-tattoo-section { padding:0 32px 20px; }
    .ki-tattoo-header {
      font-size:.6em; text-transform:uppercase; letter-spacing:2px; color:var(--text-dim);
      margin-bottom:14px; display:flex; align-items:center; gap:10px;
    }
    .ki-tattoo-header::after { content:''; flex:1; height:1px; background:var(--border-dim); }
    .ki-tattoo-stages { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
    .ki-tattoo-stage {
      background:rgba(0,0,0,.4); border:1px solid var(--border-dim); border-radius:10px;
      padding:12px 10px; text-align:center; cursor:pointer;
      transition:border-color .2s, transform .15s;
    }
    .ki-tattoo-stage:hover { border-color:var(--kp,var(--gold)); transform:translateY(-2px); }
    .ki-tattoo-stage img   { width:100%; max-width:110px; height:auto; border-radius:6px; display:block; margin:0 auto 7px; }
    .ki-tattoo-stage .sn   { font-size:.58em; text-transform:uppercase; letter-spacing:1.5px; color:var(--kp,var(--gold)); font-family:Georgia,serif; font-weight:bold; }
    .ki-tattoo-stage .snm  { font-size:.72em; color:var(--text); font-family:Georgia,serif; margin-top:2px; }
    .ki-tattoo-stage .sa   { font-size:.62em; color:var(--text-dim); opacity:.65; }

    /* ── Empty state ── */
    .ki-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:55vh; color:var(--text-dim); text-align:center; gap:10px; }
    .ki-empty-icon  { font-size:2.8em; opacity:.25; }
    .ki-empty-title { font-size:1.1em; font-family:Georgia,serif; color:var(--text); opacity:.45; }
    .ki-empty-sub   { font-size:.82em; opacity:.35; max-width:380px; line-height:1.6; }

    /* ── Gallery mode (category view) ── */
    .ki-gallery-header {
      padding:22px 32px 10px;
      border-bottom:1px solid var(--border-dim);
    }
    .ki-gallery-header h2 { font-size:1.3rem; color:var(--gold); margin:0 0 4px; font-family:Georgia,serif; }
    .ki-gallery-header p  { font-size:.8em; color:var(--text-dim); margin:0; }
    .ki-gallery-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(280px,1fr));
      gap:16px; padding:20px 32px;
    }
    .ki-gcard {
      background:rgba(0,0,0,.32); border:1px solid var(--border-dim); border-radius:10px;
      padding:16px; cursor:pointer; transition:border-color .2s, transform .15s;
    }
    .ki-gcard:hover { transform:translateY(-2px); }
    .ki-gcard-head  { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .ki-gcard-dot   { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .ki-gcard-state { font-size:.8em; font-family:Georgia,serif; color:var(--text); }
    .ki-gcard-hero  { font-size:.62em; color:var(--text-dim); }
    .ki-gcard-body  { font-size:.76em; color:var(--text); line-height:1.55; opacity:.85; }
    .ki-gcard-sub   { font-size:.7em; color:var(--text-dim); font-style:italic; margin-top:4px; }
    .ki-gcard-stages { display:flex; gap:6px; margin-top:8px; }
    .ki-gcard-stages img { width:48px; height:auto; border-radius:4px; border:1px solid var(--border-dim); }

    /* ── Responsive ── */
    @media (max-width:860px) {
      .ki-shell { flex-direction:column; }
      .ki-sidebar { width:100%; height:auto; position:relative; top:0; display:flex; flex-wrap:wrap; gap:4px; padding:8px; overflow:visible; }
      .ki-sidebar-title,.ki-region-label { display:none; }
      .ki-kingdom-btn { display:inline-flex; width:auto; margin-bottom:0; }
      .ki-btn-sub     { display:none; }
      .ki-banner,.ki-grid,.ki-tattoo-section,.ki-gallery-header,.ki-gallery-grid { padding-left:16px; padding-right:16px; }
      .ki-tattoo-stages { grid-template-columns:repeat(2,1fr); }
      .ki-grid          { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

    <nav class="maha-nav">
    <a href="index.html" class="nav-logo">Hulmane-The-Saga</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="characters.html">Heroes</a>
      <a href="state-stories.html">Kingdoms</a>
      <a href="regions.html">Regions</a>
      <a href="council.html">Council</a>
      <a href="kingdom-identity.html" class="active">Identities</a>
      <a href="tattoo-system.html">Tattoos</a>
    </div>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('nav-open')">&#9776;</button>
  </nav>

  <div class="ki-shell">

    <!-- ── Sidebar ── -->
    <aside class="ki-sidebar" id="kiSidebar">
      <div class="ki-sidebar-title">28 Kingdoms</div>
    </aside>

    <!-- ── Detail / Gallery ── -->
    <main class="ki-detail" id="kiDetail">

      <!-- Category view toggle — always visible -->
      <div class="ki-viewbar" id="kiViewbar">
        <span class="ki-viewbar-label">View by</span>
      </div>

      <div id="kiContent">
        <div class="ki-empty">
          <div class="ki-empty-icon">&#127981;</div>
          <div class="ki-empty-title">Select a Kingdom</div>
          <div class="ki-empty-sub">Choose any of the 28 kingdoms from the sidebar to see its full identity — or pick a category above to compare all kingdoms at once.</div>
        </div>
      </div>

    </main>
  </div>

  <script src="js/kingdom-identity-data.js"></script>
  <script>
  (function () {
    'use strict';

    var REGION_COLORS = { south:'#44ff88', west:'#ff8c00', east:'#44aaff', north:'#7b9eff', northeast:'#aa66ff', central:'#ffaa00' };
    var REGION_ORDER  = ['south','west','east','north','northeast','central'];

    var STAGE_LABELS = [
      null,
      { num:'Stage I',   name:'The First Lines',   age:'Birth' },
      { num:'Stage II',  name:'The Deepening',     age:'Age 10' },
      { num:'Stage III', name:'The Colouring',     age:'Age 20' },
      { num:'Stage IV',  name:'The Glorification', age:'Age 30+' }
    ];

    var VIEWS = [
      { id:'kingdom',  label:'&#127981; Kingdom' },
      { id:'weapons',  label:'&#9876; Weapons' },
      { id:'dress',    label:'&#128084; Dress' },
      { id:'culture',  label:'&#127963; Culture' },
      { id:'food',     label:'&#127857; Food' },
      { id:'vehicles', label:'&#128663; Vehicles' },
      { id:'tattoos',  label:'&#10039; Tattoos' },
      { id:'specialty',label:'&#9728; Specialties' }
    ];

    var GALLERY_TITLES = {
      weapons:   { title:'Weapons of All Kingdoms', sub:'Ancient and modern weapons — click any card to see full kingdom identity' },
      dress:     { title:'Dress & Appearance', sub:'Each kingdom\'s unique style — shaped by terrain, culture and hero' },
      culture:   { title:'Culture & Heritage', sub:'28 distinct civilisations — art, dance, tradition and history' },
      food:      { title:'Kingdom Foods', sub:'Authentic regional cuisine — what warriors eat between battles' },
      vehicles:  { title:'Vehicles of War', sub:'Ancient mounts and modern machines — built for each kingdom\'s terrain' },
      tattoos:   { title:'Sacred Tattoos — All 28 Kingdoms', sub:'All four stages of the sacred beast — click to enter kingdom detail' },
      specialty: { title:'Regional Specialties & Warfare', sub:'Terrain strengths, climate mastery and warfare styles across all six regions' }
    };

    var currentView    = 'kingdom';
    var currentKingdom = null;

    // ── Build sidebar ───────────────────────────────────────────────
    function buildSidebar() {
      var sb = document.getElementById('kiSidebar');
      REGION_ORDER.forEach(function (reg) {
        var kingdoms = window.KINGDOM_IDENTITY.filter(function (k) { return k.region === reg; });
        if (!kingdoms.length) return;
        var lbl = document.createElement('div');
        lbl.className = 'ki-region-label';
        lbl.textContent = reg.charAt(0).toUpperCase() + reg.slice(1);
        sb.appendChild(lbl);
        kingdoms.forEach(function (k) {
          var btn = document.createElement('button');
          btn.className = 'ki-kingdom-btn';
          btn.dataset.id = k.id;
          btn.style.setProperty('--kingdom-color', k.colors.primary);
          btn.innerHTML =
            '<span class="ki-dot" style="background:' + k.colors.primary + '"></span>' +
            '<span class="ki-btn-name">' + k.state +
              '<span class="ki-btn-sub">' + k.hero.name + '</span>' +
            '</span>';
          btn.addEventListener('click', function () { selectKingdom(k.id); });
          sb.appendChild(btn);
        });
      });
    }

    // ── Build view toggle bar ────────────────────────────────────────
    function buildViewbar() {
      var vb = document.getElementById('kiViewbar');
      VIEWS.forEach(function (v) {
        var btn = document.createElement('button');
        btn.className = 'ki-view-btn' + (v.id === 'kingdom' ? ' active' : '');
        btn.dataset.view = v.id;
        btn.innerHTML = v.label;
        btn.addEventListener('click', function () { switchView(v.id); });
        vb.appendChild(btn);
      });
    }

    // ── Switch view ──────────────────────────────────────────────────
    function switchView(viewId) {
      currentView = viewId;
      document.querySelectorAll('.ki-view-btn').forEach(function (b) {
        b.classList.toggle('active', b.dataset.view === viewId);
      });
      if (viewId === 'kingdom') {
        if (currentKingdom) renderKingdom(currentKingdom);
        else showEmpty();
      } else {
        renderGallery(viewId);
      }
    }

    // ── Select kingdom (switches to kingdom view) ────────────────────
    function selectKingdom(id) {
      currentKingdom = id;
      currentView = 'kingdom';
      document.querySelectorAll('.ki-view-btn').forEach(function (b) {
        b.classList.toggle('active', b.dataset.view === 'kingdom');
      });
      document.querySelectorAll('.ki-kingdom-btn').forEach(function (b) {
        b.classList.toggle('active', b.dataset.id === id);
      });
      var k = window.KINGDOM_IDENTITY.find(function (x) { return x.id === id; });
      if (k) { renderKingdom(k); window.location.hash = id; }
    }

    // ── Render kingdom detail ────────────────────────────────────────
    function renderKingdom(k) {
      var p  = k.colors.primary;
      var s  = k.colors.secondary;
      var rc = REGION_COLORS[k.region] || p;
      var rn = window.REGION_NAMES && window.REGION_NAMES[k.region];
      var rs = window.REGION_SPECIALTIES && window.REGION_SPECIALTIES[k.region];
      var su = window.KINGDOM_STORY_URLS && window.KINGDOM_STORY_URLS[k.id];

      var html = '';

      // Breadcrumb
      var sep = '<span class="ki-sep" style="color:' + p + '">›</span>';
      html +=
        '<div class="ki-breadcrumb" style="color:' + p + ';">' +
          '<a href="state-stories.html" style="color:' + p + '88;">All Kingdoms</a>' + sep +
          '<span style="color:' + p + '66;">India</span>' + sep +
          (rn ? '<span style="color:' + p + '88;">' + rn.name + ' (' + k.region.charAt(0).toUpperCase() + k.region.slice(1) + ')</span>' + sep : '') +
          '<span style="color:' + p + 'bb;">' + k.state + '</span>' + sep +
          '<span style="color:' + p + '; font-weight:bold;">' + k.kingdomName + '</span>' +
        '</div>';

      // Banner
      html +=
        '<div class="ki-banner" style="--kp:' + p + '">' +
          '<div class="ki-region-badge" style="color:' + rc + ';border-color:' + rc + '44;">' +
            k.region.charAt(0).toUpperCase() + k.region.slice(1) + (rn ? ' &bull; ' + rn.name : '') +
          '</div>' +
          '<h1 class="ki-kingdom-name">' + k.kingdomName + '</h1>' +
          '<div class="ki-hero-line"><strong style="color:' + p + ';">' + k.hero.name + '</strong> &mdash; ' + k.hero.title + '</div>' +
          '<div class="ki-theme">&ldquo;' + k.theme + '&rdquo;</div>' +
          '<div class="ki-landscape">&#127757; ' + k.landscape + '</div>' +
          '<div class="ki-banner-actions">' +
            (su ? '<a href="' + su + '" class="ki-story-btn" style="border-color:' + p + ';color:' + p + '">&#128214; Read Story</a>' : '') +
            '<span class="ki-colour-pill">' +
              '<span class="ki-swatch" style="background:' + p + '"></span>' + p +
              '<span class="ki-swatch" style="background:' + s + ';margin-left:6px;"></span>' + s +
            '</span>' +
          '</div>' +
        '</div>';

      // Grid
      html += '<div class="ki-grid" style="--kp:' + p + '">';

      html += card(CARD_ICONS.animal, 'Sacred Animal',
        k.animal.name, '<em>' + k.animal.scientific + '</em>',
        '<strong>Symbolism:</strong> ' + k.animal.symbolism +
        '<br><br><strong>Bond Power:</strong> ' + k.animal.power, p);

      html += card(CARD_ICONS.bird, 'Sacred Bird',
        k.bird.name, '',
        '<strong>Symbolism:</strong> ' + k.bird.symbolism +
        '<br><br><strong>Story Role:</strong> ' + k.bird.role, p);

      html += card(CARD_ICONS.dress, 'Dress & Style',
        'Kingdom Appearance', '', k.dress, p);

      html += card(CARD_ICONS.culture, 'Culture & Heritage',
        k.state + ' Traditions', '', k.culture, p);

      // Food
      html +=
        '<div class="ki-card" style="--kp:' + p + '">' +
          '<div class="ki-card-icon">' + CARD_ICONS.food + '</div>' +
          '<div class="ki-card-label">Kingdom Foods</div>' +
          '<div class="ki-card-title">Signature Dishes</div>' +
          '<ul class="ki-food-list">' +
            k.food.map(function (f) { return '<li>' + f + '</li>'; }).join('') +
          '</ul>' +
        '</div>';

      // Weapons
      html +=
        '<div class="ki-card" style="--kp:' + p + '">' +
          '<div class="ki-card-icon">' + CARD_ICONS.weapon + '</div>' +
          '<div class="ki-card-label">Weapons</div>' +
          '<div class="ki-weapon-row"><div class="ki-weapon-era">&#9876; Ancient</div>' +
            '<div class="ki-card-title">' + k.weapons.ancient.name + '</div>' +
            '<div class="ki-card-sub">' + k.weapons.ancient.type + '</div>' +
            '<div class="ki-card-body">' + k.weapons.ancient.ability + '</div></div>' +
          '<div class="ki-weapon-row"><div class="ki-weapon-era">&#128165; Modern</div>' +
            '<div class="ki-card-title">' + k.weapons.modern.name + '</div>' +
            '<div class="ki-card-sub">' + k.weapons.modern.type + '</div>' +
            '<div class="ki-card-body">' + k.weapons.modern.ability + '</div></div>' +
        '</div>';

      // Vehicles
      html +=
        '<div class="ki-card" style="--kp:' + p + '">' +
          '<div class="ki-card-icon">' + CARD_ICONS.vehicle + '</div>' +
          '<div class="ki-card-label">Vehicles</div>' +
          '<div class="ki-weapon-row"><div class="ki-weapon-era">&#128711; Ancient</div>' +
            '<div class="ki-card-title">' + k.vehicles.ancient.name + '</div>' +
            '<div class="ki-card-body">' + k.vehicles.ancient.desc + '</div></div>' +
          '<div class="ki-weapon-row"><div class="ki-weapon-era">&#128663; Modern</div>' +
            '<div class="ki-card-title">' + k.vehicles.modern.name + '</div>' +
            '<div class="ki-card-body">' + k.vehicles.modern.desc + '</div></div>' +
        '</div>';

      // Regional Specialty
      if (rs) {
        var ratingKeys = ['summer','monsoon','winter','snow','desert','forest','naval','plains'];
        var ratingLabels = { summer:'Summer', monsoon:'Monsoon', winter:'Winter', snow:'Snow', desert:'Desert', forest:'Forest', naval:'Naval', plains:'Plains' };
        html +=
          '<div class="ki-card" style="--kp:' + p + '">' +
            '<div class="ki-card-icon">&#9728;</div>' +
            '<div class="ki-card-label">Regional Specialty</div>' +
            '<div class="ki-card-title">Warfare & Terrain Mastery</div>' +
            '<div class="ki-card-sub">' + rs.climate + '</div>' +
            '<div class="ki-card-body" style="margin-bottom:10px;">' + rs.warfareStyle + '</div>' +
            ratingKeys.map(function (key) {
              var val = rs.rating[key] || 0;
              return '<div class="ki-rating-row">' +
                '<span class="ki-rating-label">' + ratingLabels[key] + '</span>' +
                '<div class="ki-rating-bar"><div class="ki-rating-fill" style="width:' + (val/5*100) + '%;background:' + p + ';"></div></div>' +
              '</div>';
            }).join('') +
            '<div style="margin-top:10px;">' +
              '<div style="font-size:.62em;text-transform:uppercase;letter-spacing:1px;color:' + p + ';opacity:.7;margin-bottom:4px;">Strong In</div>' +
              '<div class="ki-tag-list">' +
                rs.strongIn.map(function (t) { return '<span class="ki-tag">' + t + '</span>'; }).join('') +
              '</div>' +
              '<div style="font-size:.62em;text-transform:uppercase;letter-spacing:1px;color:#ff6666;opacity:.7;margin:8px 0 4px;">Weak In</div>' +
              '<div class="ki-tag-list">' +
                rs.weakIn.map(function (t) { return '<span class="ki-tag weak">' + t + '</span>'; }).join('') +
              '</div>' +
            '</div>' +
          '</div>';
      }

      html += '</div>'; // end grid

      // Tattoo section
      html += '<div class="ki-tattoo-section" style="--kp:' + p + '">';
      html += '<div class="ki-tattoo-header">Sacred Tattoo &mdash; Four Stages of Ascension</div>';
      html += '<div class="ki-tattoo-stages">';
      for (var i = 1; i <= 4; i++) {
        var sl = STAGE_LABELS[i];
        html +=
          '<div class="ki-tattoo-stage">' +
            '<img src="' + k.tattooPath + 'stage-' + i + '.png" alt="Stage ' + i + '" onerror="this.style.display=\'none\'">' +
            '<div class="sn">' + sl.num + '</div>' +
            '<div class="snm">' + sl.name + '</div>' +
            '<div class="sa">' + sl.age + '</div>' +
          '</div>';
      }
      html += '</div></div>';

      document.getElementById('kiContent').innerHTML = html;
    }

    // ── Render gallery (category view) ──────────────────────────────
    function renderGallery(viewId) {
      var meta = GALLERY_TITLES[viewId];
      var html =
        '<div class="ki-gallery-header">' +
          '<h2>' + meta.title + '</h2>' +
          '<p>' + meta.sub + '</p>' +
        '</div>' +
        '<div class="ki-gallery-grid">';

      window.KINGDOM_IDENTITY.forEach(function (k) {
        var p = k.colors.primary;
        var inner = '';

        switch (viewId) {
          case 'weapons':
            inner =
              '<div style="margin-bottom:7px;">' +
                '<div class="ki-weapon-era" style="font-size:.6em;opacity:.6;">&#9876; Ancient</div>' +
                '<div style="font-size:.8em;font-weight:bold;color:' + p + ';">' + k.weapons.ancient.name + '</div>' +
                '<div style="font-size:.72em;color:var(--text-dim);font-style:italic;">' + k.weapons.ancient.type + '</div>' +
                '<div style="font-size:.72em;color:var(--text);margin-top:2px;">' + k.weapons.ancient.ability + '</div>' +
              '</div>' +
              '<div style="border-top:1px solid rgba(255,255,255,.06);padding-top:7px;">' +
                '<div class="ki-weapon-era" style="font-size:.6em;opacity:.6;">&#128165; Modern</div>' +
                '<div style="font-size:.8em;font-weight:bold;color:' + p + ';">' + k.weapons.modern.name + '</div>' +
                '<div style="font-size:.72em;color:var(--text-dim);font-style:italic;">' + k.weapons.modern.type + '</div>' +
              '</div>';
            break;
          case 'dress':
            inner = '<div style="font-size:.78em;color:var(--text);line-height:1.55;">' + k.dress + '</div>';
            break;
          case 'culture':
            inner = '<div style="font-size:.78em;color:var(--text);line-height:1.55;">' + k.culture + '</div>';
            break;
          case 'food':
            inner = '<ul class="ki-food-list">' +
              k.food.map(function (f) { return '<li>' + f + '</li>'; }).join('') +
            '</ul>';
            break;
          case 'vehicles':
            inner =
              '<div style="margin-bottom:7px;">' +
                '<div style="font-size:.6em;opacity:.6;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;">&#128711; Ancient</div>' +
                '<div style="font-size:.78em;font-weight:bold;color:' + p + ';">' + k.vehicles.ancient.name + '</div>' +
              '</div>' +
              '<div style="border-top:1px solid rgba(255,255,255,.06);padding-top:7px;">' +
                '<div style="font-size:.6em;opacity:.6;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;">&#128663; Modern</div>' +
                '<div style="font-size:.78em;font-weight:bold;color:' + p + ';">' + k.vehicles.modern.name + '</div>' +
              '</div>';
            break;
          case 'tattoos':
            inner = '<div class="ki-gcard-stages">';
            for (var s = 1; s <= 4; s++) {
              inner += '<img src="' + k.tattooPath + 'stage-' + s + '.png" alt="Stage ' + s + '" onerror="this.style.display=\'none\'">';
            }
            inner += '</div>';
            break;
          case 'specialty':
            var rs = window.REGION_SPECIALTIES && window.REGION_SPECIALTIES[k.region];
            if (rs) {
              var ratingKeys = ['summer','monsoon','winter','snow','desert','forest','naval','plains'];
              inner = '<div style="font-size:.72em;color:var(--text-dim);font-style:italic;margin-bottom:8px;">' + rs.warfareStyle + '</div>';
              inner += ratingKeys.map(function (key) {
                var val = rs.rating[key] || 0;
                return '<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">' +
                  '<span style="font-size:.62em;color:var(--text-dim);width:56px;">' + key.charAt(0).toUpperCase() + key.slice(1) + '</span>' +
                  '<div style="flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.08);">' +
                    '<div style="width:' + (val/5*100) + '%;height:100%;border-radius:2px;background:' + p + ';"></div>' +
                  '</div>' +
                '</div>';
              }).join('');
            }
            break;
        }

        html +=
          '<div class="ki-gcard" style="border-color:' + p + '33;" onclick="window._kiSelect(\'' + k.id + '\')">' +
            '<div class="ki-gcard-head">' +
              '<span class="ki-gcard-dot" style="background:' + p + ';"></span>' +
              '<div>' +
                '<div class="ki-gcard-state" style="color:' + p + ';">' + k.state + '</div>' +
                '<div class="ki-gcard-hero">' + k.hero.name + ' &bull; ' + k.region + '</div>' +
              '</div>' +
            '</div>' +
            inner +
          '</div>';
      });

      html += '</div>';
      document.getElementById('kiContent').innerHTML = html;
    }

    // ── Show empty state ─────────────────────────────────────────────
    function showEmpty() {
      document.getElementById('kiContent').innerHTML =
        '<div class="ki-empty">' +
          '<div class="ki-empty-icon">&#127981;</div>' +
          '<div class="ki-empty-title">Select a Kingdom</div>' +
          '<div class="ki-empty-sub">Choose any kingdom from the sidebar, or pick a category above to compare all 28 kingdoms at once.</div>' +
        '</div>';
    }

    // ── Card helper ──────────────────────────────────────────────────
    var CARD_ICONS = { animal:'&#127993;', bird:'&#128038;', dress:'&#128084;', culture:'&#127963;', food:'&#127857;', weapon:'&#9876;', vehicle:'&#128663;' };
    function card(icon, label, title, sub, body, color) {
      return (
        '<div class="ki-card" style="--kp:' + color + '">' +
          '<div class="ki-card-icon">' + icon + '</div>' +
          '<div class="ki-card-label">' + label + '</div>' +
          '<div class="ki-card-title">' + title + '</div>' +
          (sub ? '<div class="ki-card-sub">' + sub + '</div>' : '') +
          '<div class="ki-card-body">' + body + '</div>' +
        '</div>'
      );
    }

    // ── Global callback for gallery card clicks ───────────────────────
    window._kiSelect = function (id) { selectKingdom(id); };

    // ── Init ──────────────────────────────────────────────────────────
    buildSidebar();
    buildViewbar();

    var hash = window.location.hash.replace('#', '');
    if (hash && window.KINGDOM_IDENTITY.find(function (k) { return k.id === hash; })) {
      selectKingdom(hash);
    }

  }());
  </script>
</body>
</html>
